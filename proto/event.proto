syntax = "proto3";

package event;

option go_package = "benchmark/server/eventpb";

message EventPayload {
  double amount = 1;
  string currency = 2;
  string merchant = 3;
  string location = 4;
  string device = 5;
}

message LogRequest {
  string event_id = 1;
  int64 timestamp = 2;
  string user_id = 3;
  string event_type = 4;
  EventPayload payload = 5;
}

message LogResponse {
  string status = 1;
}

service EventService {
  rpc LogEvent(LogRequest) returns (LogResponse);
}
